name: Test Suite

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "0.1.12" # Matches project's initialization version, or use "latest"
        
    - name: Install dependencies
      run: uv sync --frozen
      
    - name: Run tests with pytest
      run: uv run pytest

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-split-layout">
        
        <!-- Left Side: Branding / Aesthetic -->
        <div class="auth-brand">
            <div class="brand-content">
                <h1>TaskFlow</h1>
                <p>Organize your work, effortlessly.<br>The professional way to get things done.</p>
            </div>
            <!-- Decorative Elements -->
            <div class="glass-orb orb-1"></div>
            <div class="glass-orb orb-2"></div>
        </div>

        <!-- Right Side: Forms -->
        <div class="auth-form-container">
            <div class="glass-card auth-card">
                <h2>Welcome Back</h2>
                <p class="subtitle">Enter your credentials to access your dashboard.</p>
                
                <div class="tabs">
                    <button class="tab active" onclick="switchAuthTab('login')">Login</button>
                    <button class="tab" onclick="switchAuthTab('register')">Register</button>
                </div>

                <form id="auth-form" onsubmit="handleAuth(event)">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="you@example.com">
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required minlength="8" placeholder="••••••••">
                    </div>
                    <p id="auth-error" class="error-msg"></p>
                    <button type="submit" class="btn-primary" id="auth-submit">Login</button>
                </form>
            </div>
        </div>

    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <script src="auth.js"></script>
</body>
</html>

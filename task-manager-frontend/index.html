<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Auth View -->
        <div id="auth-view" class="view active">
            <div class="glass-card auth-card">
                <h1>TaskFlow</h1>
                <p class="subtitle">Organize your work, effortlessly.</p>
                
                <div class="tabs">
                    <button class="tab active" onclick="switchAuthTab('login')">Login</button>
                    <button class="tab" onclick="switchAuthTab('register')">Register</button>
                </div>

                <form id="auth-form" onsubmit="handleAuth(event)">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required placeholder="you@example.com">
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required minlength="8" placeholder="••••••••">
                    </div>
                    <p id="auth-error" class="error-msg"></p>
                    <button type="submit" class="btn-primary" id="auth-submit">Login</button>
                </form>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="view">
            <header class="glass-header">
                <h2>TaskFlow</h2>
                <div class="user-actions">
                    <span id="user-email"></span>
                    <button class="btn-outline" onclick="logout()">Logout</button>
                </div>
            </header>
            
            <main class="dashboard-content">
                <section class="task-creation glass-card">
                    <h3>Create New Task</h3>
                    <form id="task-form" onsubmit="createTask(event)">
                        <div class="input-group">
                            <input type="text" id="task-title" required placeholder="What needs to be done?">
                        </div>
                        <div class="input-group">
                            <textarea id="task-desc" placeholder="Add some details... (optional)" rows="2"></textarea>
                        </div>
                        <button type="submit" class="btn-primary">Add Task</button>
                    </form>
                </section>

                <section class="task-list-section">
                    <div class="task-filters">
                        <button class="filter-btn active" data-filter="ALL" onclick="filterTasks('ALL')">All</button>
                        <button class="filter-btn" data-filter="PENDING" onclick="filterTasks('PENDING')">Pending</button>
                        <button class="filter-btn" data-filter="IN_PROGRESS" onclick="filterTasks('IN_PROGRESS')">In Progress</button>
                        <button class="filter-btn" data-filter="COMPLETED" onclick="filterTasks('COMPLETED')">Completed</button>
                    </div>
                    <div id="tasks-container">
                        <!-- Tasks injected here by JS -->
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>

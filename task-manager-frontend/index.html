<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="animated-bg"></div>
    <div class="auth-split-layout">
        
        <!-- Left Side: Branding / Aesthetic -->
        <div class="auth-brand">
            <div class="brand-content">
                <h1>TaskFlow</h1>
                <p>Organize your work, effortlessly.<br>The professional way to get things done.</p>
            </div>
            <!-- Decorative Elements -->
            <div class="glass-orb orb-1"></div>
            <div class="glass-orb orb-2"></div>
        </div>

        <!-- Right Side: Forms -->
        <div class="auth-form-container">
            <div class="glass-card auth-card">
                <h2>Welcome Back</h2>
                <p class="subtitle">Enter your credentials to access your dashboard.</p>
                
                <div class="tabs">
                    <button class="tab active" onclick="switchAuthTab('login')">Login</button>
                    <button class="tab" onclick="switchAuthTab('register')">Register</button>
                </div>

                <form id="auth-form" onsubmit="handleAuth(event)">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="you@example.com">
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" required minlength="8" placeholder="••••••••">
                            <button type="button" class="toggle-password-btn" onclick="togglePassword()" title="Toggle Password">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eye-icon">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <p id="auth-error" class="error-msg"></p>
                    <button type="submit" class="btn-primary" id="auth-submit">Login</button>
                </form>
            </div>
        </div>

    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <script src="auth.js"></script>
</body>
</html>

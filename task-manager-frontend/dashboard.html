<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">
    <div class="animated-bg"></div>

    <div class="dashboard-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass-card">
            <div class="sidebar-brand">
                <h2>TaskFlow</h2>
            </div>
            
            <nav class="sidebar-nav">
                <p class="nav-label">VIEWS</p>
                <button class="nav-btn active" data-filter="ALL" onclick="filterTasks('ALL')">
                    <span class="icon">⊞</span> All Tasks
                </button>
                <button class="nav-btn" data-filter="PENDING" onclick="filterTasks('PENDING')">
                    <span class="icon">○</span> Pending
                </button>
                <button class="nav-btn" data-filter="IN_PROGRESS" onclick="filterTasks('IN_PROGRESS')">
                    <span class="icon">◐</span> In Progress
                </button>
                <button class="nav-btn" data-filter="COMPLETED" onclick="filterTasks('COMPLETED')">
                    <span class="icon">●</span> Completed
                </button>
                <div class="nav-divider"></div>
                <button class="nav-btn" onclick="openCategoryModal()">
                    <span class="icon">🏷️</span> Manage Categories
                </button>
                <button class="nav-btn" onclick="openTagModal()">
                    <span class="icon">🔖</span> Manage Tags
                </button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            
            <!-- Top Navbar -->
            <header class="top-nav glass-header">
                <h2 id="current-view-title">All Tasks</h2>
                
                <!-- Search Bar -->
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-input" placeholder="Search tasks..." oninput="handleSearch(event)">
                </div>

                <div class="user-profile">
                    <span class="avatar">👤</span>
                    <span id="user-email">User</span>
                    <button class="btn-outline btn-sm" onclick="logout()">Logout</button>
                </div>
            </header>

            <!-- Dashboard Stats -->
            <div class="dashboard-stats">
                <div class="stat-card total-card">
                    <div class="stat-icon">📋</div>
                    <div class="stat-info">
                        <h3>Total Tasks</h3>
                        <p id="stat-total">0</p>
                    </div>
                </div>
                <div class="stat-card pending-card">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-info">
                        <h3>Pending</h3>
                        <p id="stat-pending">0</p>
                    </div>
                </div>
                <div class="stat-card completed-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-info">
                        <h3>Completed</h3>
                        <p id="stat-completed">0</p>
                    </div>
                </div>
                <div class="stat-card overdue-card">
                    <div class="stat-icon">⚠️</div>
                    <div class="stat-info">
                        <h3>Overdue</h3>
                        <p id="stat-overdue">0</p>
                    </div>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="toolbar">
                <div class="filters">
                    <select id="filter-priority" onchange="applyFilters()">
                        <option value="">All Priorities</option>
                        <option value="LOW">Low</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="HIGH">High</option>
                        <option value="CRITICAL">Critical</option>
                    </select>
                    <select id="filter-category" onchange="applyFilters()">
                        <option value="">All Categories</option>
                        <!-- Categories injected here -->
                    </select>
                </div>
                <div class="sorting">
                    <select id="sort-select" onchange="applyFilters()">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="due_date">Due Date</option>
                        <option value="priority">Priority</option>
                        <option value="alphabetically">A-Z</option>
                    </select>
                </div>
            </div>

            <!-- Tasks Container -->
            <div class="tasks-scroll-area">
                <div id="tasks-container">
                    <!-- Tasks injected by JS -->
                </div>
            </div>

            <!-- Floating Action Button (FAB) -->
            <button class="fab" onclick="openModal()" title="Add New Task">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            </button>

        </main>
    </div>

    <!-- Create/Edit Task Modal -->
    <div id="task-modal" class="modal-overlay">
        <div class="glass-card modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Create New Task</h3>
                <button class="btn-icon close-modal" onclick="closeModal('task-modal')">✕</button>
            </div>
            <form id="task-form" onsubmit="saveTask(event)">
                <input type="hidden" id="task-id">
                <div class="input-group">
                    <label for="task-title">Title</label>
                    <input type="text" id="task-title" required placeholder="What needs to be done?">
                </div>
                <div class="input-group">
                    <label for="task-desc">Description (Optional)</label>
                    <textarea id="task-desc" placeholder="Add some details..." rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="input-group half-width">
                        <label for="task-priority">Priority</label>
                        <select id="task-priority">
                            <option value="LOW">Low</option>
                            <option value="MEDIUM" selected>Medium</option>
                            <option value="HIGH">High</option>
                            <option value="CRITICAL">Critical</option>
                        </select>
                    </div>
                    <div class="input-group half-width">
                        <label for="task-due-date">Due Date (Optional)</label>
                        <input type="datetime-local" id="task-due-date">
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label for="task-category">Category (Optional)</label>
                        <select id="task-category">
                            <option value="">None</option>
                            <!-- Categories injected here -->
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="task-tags">Tags (Optional)</label>
                        <select id="task-tags" multiple style="height: auto; min-height: 42px;">
                            <!-- Tags injected here -->
                        </select>
                    </div>
                </div>
                
                <div id="subtasks-section" style="display: none; margin-bottom: 1rem;">
                    <h4>Subtasks</h4>
                    <div id="subtasks-list" style="margin-bottom: 0.5rem; max-height: 150px; overflow-y: auto;">
                        <!-- Subtasks injected here -->
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="new-subtask-title" placeholder="New subtask..." style="flex: 1; padding: 8px; border-radius: 4px; border: 1px solid var(--border-color);">
                        <button type="button" class="btn-outline btn-sm" onclick="addSubtask()">Add</button>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-outline" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Manage Categories Modal -->
    <div id="category-modal" class="modal-overlay">
        <div class="glass-card modal-content">
            <div class="modal-header">
                <h3>Manage Categories</h3>
                <button class="btn-icon close-modal" onclick="closeCategoryModal()">✕</button>
            </div>
            
            <form id="category-form" onsubmit="saveCategory(event)" style="margin-bottom: 20px;">
                <div class="input-row">
                    <div class="input-group" style="flex: 3;">
                        <input type="text" id="new-category-name" required placeholder="New Category Name">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <input type="color" id="new-category-color" value="#8b5cf6" style="width: 100%; height: 42px; padding: 2px;">
                    </div>
                    <button type="submit" class="btn-primary" style="align-self: center;">Add</button>
                </div>
            </form>

            <div class="categories-list-container" style="max-height: 200px; overflow-y: auto;">
                <ul id="categories-list" class="styled-list">
                    <!-- Categories injected here -->
                </ul>
            </div>
        </div>
    </div>

    <!-- Manage Tags Modal -->
    <div id="tag-modal" class="modal-overlay">
        <div class="glass-card modal-content">
            <div class="modal-header">
                <h3>Manage Tags</h3>
                <button class="btn-icon close-modal" onclick="closeTagModal()">✕</button>
            </div>
            
            <form id="tag-form" onsubmit="saveTag(event)" style="margin-bottom: 20px;">
                <div class="input-row">
                    <div class="input-group" style="flex: 3;">
                        <input type="text" id="new-tag-name" required placeholder="New Tag Name">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <input type="color" id="new-tag-color" value="#10b981" style="width: 100%; height: 42px; padding: 2px;">
                    </div>
                    <button type="submit" class="btn-primary" style="align-self: center;">Add</button>
                </div>
            </form>

            <div class="tags-list-container" style="max-height: 200px; overflow-y: auto;">
                <ul id="tags-list" class="styled-list">
                    <!-- Tags injected here -->
                </ul>
            </div>
        </div>
    </div>


    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <script src="dashboard.js"></script>
</body>
</html>
